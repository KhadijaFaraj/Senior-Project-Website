<!doctype html>
<html>
  <head>
    <title>Downloads</title>
    <link rel="stylesheet" href="theme.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <script src="motion.js"></script>
  <body>
    <div id="navbar"></div>
    <script>
      fetch("navbar.html")
        .then((r) => r.text())
        .then((d) => (document.getElementById("navbar").innerHTML = d));
    </script>

    <header class="hero">
      <h1>Downloads</h1>
      <p>Research materials and trained model</p>
    </header>

    <main class="container">
      <div class="download-card">
        <div>
          <h3><i class="fa-solid fa-file-pdf"></i> Research Paper</h3>
          <p>Full PDF documentation</p>
        </div>
        <a class="btn" href="full-research.pdf">
          <i class="fa-solid fa-download"></i> Download
        </a>
      </div>

      <div class="download-card">
        <div>
          <h3><i class="fa-solid fa-image"></i> Project Poster</h3>
          <p>High-level overview of research findings</p>
        </div>
        <a class="btn" href="poster.pdf">
          <i class="fa-solid fa-download"></i> Download
        </a>
      </div>

      <div class="download-card">
        <div>
          <h3><i class="fa-solid fa-table"></i> Survey Responses</h3>
          <p>Excel file containing all survey responses</p>
        </div>
        <a class="btn" href="responses.xlsx">
          <i class="fa-solid fa-download"></i> Download
        </a>
      </div>

      <div class="download-card">
        <div>
          <h3><i class="fa-solid fa-brain"></i> Trained Model</h3>
          <p>The J48 model trained by Weka</p>
        </div>
        <a class="btn" href="T1.model">
          <i class="fa-solid fa-download"></i> Download
        </a>
      </div>
    </main>
  </body>
</html>
