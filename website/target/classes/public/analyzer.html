<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP Usage Gap Prediction</title>
  <link rel="stylesheet" href="theme.css" />
</head>

<script src="motion.js"></script>
<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<script>
fetch("navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });
</script>

<!-- ================= HERO HEADER ================= -->
<header class="hero">
  <h1>ERP Usage Gap Prediction</h1>
  <p>
    Enter organizational and system parameters below to predict ERP usage gap using the trained J48 decision tree model.
  </p>
</header>

<!-- ================= FORM ================= -->
<main class="container">

  <div class="form-container">

    <form action="/predict" method="POST">

      <!-- SECTION 1 -->
      <div class="form-section">
        <h2>Organization Details</h2>

        <div class="form-group">
          <label>Organization Type</label>
          <select name="ORG_TYPE" required>
            <option value="">Select type</option>
            <option>Supermarket / Hypermarket</option>
            <option>Clothing / Fashion</option>
            <option>Electronics</option>
            <option>Pharmacy</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Position</label>
          <select name="POSITION" required>
            <option value="">Select position</option>
            <option>Clerk / Staff</option>
            <option>Manager</option>
            <option>Supervisor</option>
            <option>Senior Management</option>
          </select>
        </div>

        <div class="form-group">
          <label>ERP Usage Period</label>
          <select name="USG_PERIOD" required>
            <option value="">Select usage period</option>
            <option value="lt6m">Less than 6 months</option>
            <option value="6m_1y">6 months to 1 year</option>
            <option value="1_2y">1 to 2 years</option>
            <option value="2_5y">2 to 5 years</option>
            <option value="gt5y">More than 5 years</option>
          </select>
        </div>

      </div>

      <!-- SECTION 2 -->
      <div class="form-section">
        <h2>System Configuration</h2>

        <div class="form-group">
          <label>ERP System</label>
          <select name="ERP_SYS" required>
            <option>SAP</option>
            <option>Oracle</option>
            <option>Microsoft Dynamics</option>
            <option>Odoo</option>
          </select>
        </div>

        <div class="form-group">
          <label>System Complexity</label>
          <select name="COMPLEXITY">
            <option>High</option>
            <option>Low</option>
          </select>
        </div>

        <div class="form-group">
          <label>System Monitoring</label>
          <select name="MONITOR">
            <option>High</option>
            <option>Low</option>
          </select>
        </div>

      </div>

      <!-- SECTION 3 -->
      <div class="form-section">
        <h2>Operational Factors</h2>

        <div class="form-group">
          <label>Training Quality</label>
          <select name="TRAINING">
            <option>High</option>
            <option>Low</option>
          </select>
        </div>

        <div class="form-group">
          <label>Performance Satisfaction</label>
          <select name="PERFORMANCE">
            <option>High</option>
            <option>Low</option>
          </select>
        </div>

        <div class="form-group">
          <label>Management Support</label>
          <select name="MGT_SUPPORT">
            <option>High</option>
            <option>Low</option>
          </select>
        </div>

        <div class="form-group">
          <label>External Tools Usage</label>
          <select name="EXTERNAL_TOOLS">
            <option>High</option>
            <option>Low</option>
          </select>
        </div>

      </div>

      <!-- SUBMIT -->
      <button class="btn" type="submit">Predict Usage Gap</button>

    </form>

  </div>

</main>

<footer class="footer">
  <p>
    For inquiries about this project, email:
    <a href="mailto:info@usagegap.site">info@usagegap.site</a>
  </p>
</footer>
</body>
</html>
